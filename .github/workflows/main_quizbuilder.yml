name: Build and deploy Node.js app to Azure Web App - quizbuilder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4
      - name: List files
        run: ls -R
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      

      - name: npm install, build
        run: |
          npm install
          npm run build
          cp package.json dist/
          cp package-lock.json dist/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C0DF8A376E124DC4989600AB2A361190 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B2E92E71E10C495ABB0049F42B9740AF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B4738408767E4FDB914CC25850FE6EDE }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'quizbuilder'
          slot-name: 'Production'
          package: .
